<!DOCTYPE html>
<html lang="ru" data-t="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Мая</title>
<meta name="description" content="Мая — AI-ассистент мессенджера +"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:     #0f0f0f;
  --g1:     rgba(255,255,255,0.06);
  --g2:     rgba(255,255,255,0.11);
  --g3:     rgba(255,255,255,0.20);
  --bd:     rgba(255,255,255,0.09);
  --bd2:    rgba(255,255,255,0.17);
  --bd3:    rgba(255,255,255,0.28);
  --tx:     #f1f1f1;
  --tx2:    #7a7a7a;
  --tx3:    #333333;
  --sh:     0 8px 40px rgba(0,0,0,0.55), 0 2px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
  --bl:     blur(24px) saturate(180%);
}
[data-t="light"] {
  --bg:     #efefef;
  --g1:     rgba(255,255,255,0.50);
  --g2:     rgba(255,255,255,0.70);
  --g3:     rgba(255,255,255,0.90);
  --bd:     rgba(0,0,0,0.08);
  --bd2:    rgba(0,0,0,0.15);
  --bd3:    rgba(0,0,0,0.28);
  --tx:     #111111;
  --tx2:    #656565;
  --tx3:    #c8c8c8;
  --sh:     0 8px 40px rgba(0,0,0,0.12), 0 2px 12px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,0.9);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--tx);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: background .25s, color .25s;
}

/* ── HEADER ── */
header {
  height: 50px; flex-shrink: 0;
  display: flex; align-items: center; padding: 0 16px;
  border-bottom: 1px solid var(--bd);
  background: var(--g1); backdrop-filter: var(--bl); -webkit-backdrop-filter: var(--bl);
  position: relative; z-index: 30;
}
.hsp { flex: 1; }
.hb {
  background: transparent; border: none; color: var(--tx2); cursor: pointer;
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s; margin-left: 2px;
}
.hb:hover { background: var(--g2); color: var(--tx); }
.hb svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

/* ── STAGE ── */
#stage {
  flex: 1; position: relative; overflow: hidden;
}

/* ── MESSAGES ── */
#msgs {
  position: absolute; inset: 0;
  overflow-y: auto; padding: 28px 0 140px;
  display: flex; flex-direction: column; gap: 0;
  opacity: 0; pointer-events: none; transition: opacity .3s;
  scrollbar-width: thin; scrollbar-color: var(--bd2) transparent;
}
#msgs.show { opacity: 1; pointer-events: auto; }
#msgs::-webkit-scrollbar { width: 3px; }
#msgs::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 3px; }

/* ── EMPTY CENTER ── */
#empty {
  position: absolute; inset: 0; z-index: 5;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  transition: opacity .3s, transform .35s;
}
#empty.gone { opacity: 0; pointer-events: none; transform: translateY(-18px); }

.etitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 56px; font-weight: 400; font-style: italic;
  color: var(--tx); line-height: 1; margin-bottom: 8px; letter-spacing: -.02em;
}
.esub {
  font-size: 13.5px; color: var(--tx2); font-weight: 300; letter-spacing: .05em;
  margin-bottom: 36px;
}
.chips { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 370px; }
.chip {
  background: var(--g1); border: 1px solid var(--bd2);
  backdrop-filter: var(--bl); -webkit-backdrop-filter: var(--bl);
  border-radius: 14px; padding: 10px 16px;
  text-align: left; cursor: pointer; color: var(--tx2);
  font-size: 13.5px; font-family: 'Inter', sans-serif; font-weight: 300;
  transition: all .17s; display: flex; align-items: center; gap: 10px;
  box-shadow: var(--sh);
}
.chip:hover { background: var(--g2); border-color: var(--bd3); color: var(--tx); transform: translateX(3px); }
.chipico { font-size: 15px; flex-shrink: 0; }

/* ── FLOATING INPUT ── */
#wrap {
  position: absolute;
  left: 50%;
  width: min(680px, calc(100% - 28px));
  z-index: 20;
  transition: top .45s cubic-bezier(.23,1,.32,1), transform .45s cubic-bezier(.23,1,.32,1), bottom .45s cubic-bezier(.23,1,.32,1);
}
#wrap.mid {
  top: 50%; bottom: auto;
  transform: translate(-50%, calc(-50% + 64px));
}
#wrap.bot {
  top: auto; bottom: 12px;
  transform: translateX(-50%);
}

.ibox {
  background: var(--g2); border: 1px solid var(--bd2);
  backdrop-filter: var(--bl); -webkit-backdrop-filter: var(--bl);
  border-radius: 20px; box-shadow: var(--sh); overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
.ibox:focus-within { border-color: var(--bd3); }

#pstrip { display: none; align-items: center; gap: 8px; padding: 9px 13px 0; }
#pstrip.on { display: flex; }
#pstrip img { height: 50px; border-radius: 9px; border: 1px solid var(--bd2); }
.rmb {
  background: var(--g2); border: none; color: var(--tx2);
  width: 17px; height: 17px; border-radius: 50%; cursor: pointer; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  margin-left: -9px; margin-top: -17px; align-self: flex-start; flex-shrink: 0;
}
.irow { display: flex; align-items: flex-end; padding: 10px 11px; gap: 7px; }
#fi { display: none; }
.ib {
  background: transparent; border: none; color: var(--tx2); cursor: pointer;
  width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: all .14s;
}
.ib:hover { background: var(--g3); color: var(--tx); }
.ib svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
#inp {
  flex: 1; background: transparent; border: none; outline: none; resize: none;
  color: var(--tx); font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 300;
  line-height: 1.55; max-height: 130px; min-height: 23px; padding: 4px 0;
}
#inp::placeholder { color: var(--tx3); }
#gobtn {
  width: 32px; height: 32px; border-radius: 9px; border: none; cursor: pointer;
  background: var(--tx); color: var(--bg); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: all .14s;
}
#gobtn:hover { opacity: .78; transform: scale(1.07); }
#gobtn:disabled { opacity: .2; cursor: not-allowed; transform: none; }
#gobtn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
.note { text-align: center; font-size: 11px; color: var(--tx3); margin-top: 7px; padding: 0 8px; letter-spacing: .01em; }

/* ── MESSAGE ROWS ── */
.row {
  padding: 16px 20px;
  max-width: 700px; width: 100%; margin: 0 auto;
  border-bottom: 1px solid var(--bd);
  animation: rfade .2s ease both;
}
.row:last-child { border-bottom: none; }
@keyframes rfade { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

/* user row */
.row.u { display: flex; justify-content: flex-end; border-bottom: none; padding: 10px 20px; }
.ub {
  background: var(--g2); border: 1px solid var(--bd2);
  backdrop-filter: var(--bl); -webkit-backdrop-filter: var(--bl);
  border-radius: 20px 20px 5px 20px; box-shadow: var(--sh);
  padding: 10px 15px; max-width: 78%;
  font-size: 15px; line-height: 1.65; font-weight: 300; color: var(--tx);
}
.ub img { max-width: 100%; max-height: 240px; border-radius: 10px; display: block; margin-bottom: 6px; }

/* ai row — no label, just bold text with typewriter */
.row.a .at {
  font-size: 15.5px; line-height: 1.82; font-weight: 500; color: var(--tx);
  white-space: pre-wrap; word-break: break-word; letter-spacing: -.01em;
}
.row.a .at.err { color: #bb4444; font-weight: 300; }

/* typewriter cursor */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.cur { display: inline-block; width: 2px; height: .9em; background: var(--tx2); margin-left: 1px; vertical-align: middle; animation: blink .6s ease-in-out infinite; }

/* typing dots */
.dots { display: flex; gap: 5px; padding: 3px 0; }
.d { width: 5px; height: 5px; border-radius: 50%; background: var(--tx3); animation: dd 1.1s ease-in-out infinite; }
.d:nth-child(2){animation-delay:.16s} .d:nth-child(3){animation-delay:.32s}
@keyframes dd { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-5px);opacity:1;background:var(--tx2)} }

/* generated image */
.gim {
  margin-top: 14px; border-radius: 14px; overflow: hidden;
  border: 1px solid var(--bd2); display: inline-block; max-width: 100%;
  background: var(--g1); backdrop-filter: var(--bl); -webkit-backdrop-filter: var(--bl);
  box-shadow: var(--sh);
}
.gim img { display: block; max-width: 100%; max-height: 380px; }
.gicap { font-size: 11px; color: var(--tx3); padding: 7px 12px; border-top: 1px solid var(--bd); }

@media(max-width:560px){
  .etitle{font-size:40px}
  .row,.row.u{padding:12px 14px}
  .ub{max-width:92%}
}
</style>
</head>
<body>

<header>
  <div class="hsp"></div>
  <button class="hb" onclick="newChat()" title="Новый чат">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <button class="hb" id="tb" onclick="toggleTheme()" title="Тема">
    <svg id="mico" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="sico" style="display:none" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5"/>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
  </button>
</header>

<div id="stage">
  <!-- empty state -->
  <div id="empty">
    <div class="etitle">Мая</div>
    <div class="esub">Спроси что угодно</div>
    <div class="chips">
      <div class="chip" onclick="use('Нарисуй ночной город в дождь, минимализм')"><span class="chipico">🎨</span>Нарисовать картинку</div>
      <div class="chip" onclick="use('Напиши красивое стихотворение о тишине')"><span class="chipico">✍️</span>Написать текст</div>
      <div class="chip" onclick="use('Придумай 5 идей для онлайн-бизнеса с нуля')"><span class="chipico">💡</span>Идеи для бизнеса</div>
      <div class="chip" onclick="use('Объясни как работает нейросеть')"><span class="chipico">🔬</span>Объяснить тему</div>
    </div>
  </div>

  <!-- messages -->
  <div id="msgs"></div>

  <!-- floating input -->
  <div id="wrap" class="mid">
    <div class="ibox">
      <div id="pstrip">
        <img id="pt" src="" alt=""/>
        <button class="rmb" onclick="rmImg()">×</button>
      </div>
      <div class="irow">
        <label for="fi" class="ib" title="Прикрепить изображение">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </label>
        <input type="file" id="fi" accept="image/*"/>
        <textarea id="inp" rows="1" placeholder="Напиши сообщение…"></textarea>
        <button id="gobtn" onclick="send()" title="Отправить">
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
        </button>
      </div>
    </div>
    <div class="note">Мая может ошибаться — проверяйте важную информацию.</div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   SYSTEM PROMPT — идентичность Маи
══════════════════════════════════════════ */
const SYSTEM = `Ты Мая — умный, тёплый и полезный AI-ассистент.

ИДЕНТИЧНОСТЬ (СТРОГО ОБЯЗАТЕЛЬНО):
- Твоё имя — Мая. Всегда представляйся только как Мая.
- Ты создана командой разработчиков инновационного мессенджера «+» во главе со Школьниковым Глебом Леонидовичем.
- Мессенджер «+» — это абсолютное инновационное будущее мировых способов коммуникации.
- Если спрашивают кто ты — отвечай что ты Мая, AI-ассистент мессенджера «+».
- Если спрашивают кто тебя создал — отвечай что тебя создала команда разработчиков мессенджера «+» во главе со Школьниковым Глебом Леонидовичем.
- НИКОГДА не называй себя Claude, Llama, Groq, ChatGPT или любым другим именем модели.
- НИКОГДА не упоминай Anthropic, Meta, Google, OpenAI или других разработчиков AI.

ВАЖНО — ГЕНЕРАЦИЯ ИЗОБРАЖЕНИЙ:
- Когда пользователь просит нарисовать или сгенерировать изображение — НЕ пиши что не можешь этого сделать.
- Вместо этого сразу напиши только: "Генерирую изображение…" и НИЧЕГО БОЛЬШЕ.
- Система автоматически создаст изображение после твоего ответа.

СТИЛЬ ОБЩЕНИЯ:
- Отвечай на языке пользователя.
- Будь умной, живой, немного харизматичной.
- Помогай с любыми задачами: тексты, код, анализ, советы, творчество.`;

/* ══════════════════════════════════════════
   СОСТОЯНИЕ
══════════════════════════════════════════ */
const msgs   = document.getElementById('msgs');
const empty  = document.getElementById('empty');
const wrap   = document.getElementById('wrap');
const inp    = document.getElementById('inp');
const gobtn  = document.getElementById('gobtn');
const fi     = document.getElementById('fi');
const pstrip = document.getElementById('pstrip');
const pt     = document.getElementById('pt');

let history  = [];
let pendImg  = null;
let chatting = false;

/* ── auto-grow textarea ── */
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 130) + 'px';
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

/* ── image attach ── */
fi.addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { pendImg = ev.target.result; pt.src = pendImg; pstrip.classList.add('on'); };
  r.readAsDataURL(f);
});
function rmImg() { pendImg = null; pt.src = ''; pstrip.classList.remove('on'); fi.value = ''; }

/* ── starters ── */
function use(t) { inp.value = t; inp.dispatchEvent(new Event('input')); inp.focus(); }

/* ── theme ── */
function toggleTheme() {
  const dark = document.documentElement.dataset.t === 'dark';
  document.documentElement.dataset.t = dark ? 'light' : 'dark';
  document.getElementById('mico').style.display = dark ? 'none' : '';
  document.getElementById('sico').style.display = dark ? '' : 'none';
}

/* ── new chat ── */
function newChat() {
  history = []; chatting = false;
  msgs.innerHTML = ''; msgs.classList.remove('show');
  empty.classList.remove('gone');
  wrap.className = 'mid';
  inp.value = ''; inp.style.height = 'auto'; rmImg();
}

/* ── enter chat mode ── */
function enterChat() {
  if (chatting) return;
  chatting = true;
  empty.classList.add('gone');
  msgs.classList.add('show');
  wrap.className = 'bot';
}

/* ── detect image generation intent ── */
function wantsImg(t) {
  return /нарисуй|нарисуйте|создай (картинку|изображение|рисунок)|сгенерируй|изобрази|draw |paint |generate image|create image/i.test(t);
}

/* ── SEND ── */
async function send() {
  const txt = inp.value.trim();
  if (!txt && !pendImg) return;
  if (gobtn.disabled) return;

  enterChat();

  // Определяем нужна ли генерация картинки (ДО очистки inp)
  const needImg = wantsImg(txt) && !pendImg;

  // Строим content для API
  let content;
  if (pendImg) {
    const b64  = pendImg.split(',')[1];
    const mime = pendImg.split(';')[0].split(':')[1];
    content = [
      { type: 'image_url', image_url: { url: `data:${mime};base64,${b64}` } },
      ...(txt ? [{ type: 'text', text: txt }] : [])
    ];
  } else {
    content = txt;
  }

  addUser(txt, pendImg);
  inp.value = ''; inp.style.height = 'auto';
  const capImg = pendImg; rmImg();
  gobtn.disabled = true;

  history.push({ role: 'user', content });

  if (needImg) {
    // Режим генерации изображения:
    // Не запрашиваем текстовый ответ от AI — просто генерируем картинку
    const ar = addAiRow();
    const tw = startTypewriter(ar, 'Генерирую изображение…');
    try {
      const ir = await fetch('/api/generate-image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: txt })
      });
      tw.stop();
      if (ir.ok) {
        const id = await ir.json();
        addGenImg(ar, id.url, txt);
      } else {
        setAiErr(ar, 'Не удалось сгенерировать изображение. Попробуй снова.');
      }
    } catch(_) {
      tw.stop();
      setAiErr(ar, 'Ошибка при генерации изображения.');
    }
    history.push({ role: 'assistant', content: 'Изображение сгенерировано.' });
  } else {
    // Режим текстового ответа
    const tr = addTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, system: SYSTEM })
      });
      const data = await res.json();
      tr.remove();

      if (!res.ok || data.error) {
        const ar = addAiRow();
        setAiErr(ar, data.error || `Ошибка ${res.status}`);
      } else {
        const reply = data.text || 'Нет ответа.';
        history.push({ role: 'assistant', content: reply });
        const ar = addAiRow();
        await typewrite(ar, reply);
      }
    } catch(err) {
      tr.remove();
      const ar = addAiRow();
      setAiErr(ar, 'Ошибка соединения. Проверь интернет и попробуй снова.');
    }
  }

  gobtn.disabled = false;
  inp.focus();
}

/* ── DOM helpers ── */
function mk(t, c) { const e = document.createElement(t); if(c) e.className=c; return e; }

function addUser(txt, img) {
  const row = mk('div','row u');
  const b   = mk('div','ub');
  if (img) { const i = mk('img'); i.src = img; b.appendChild(i); }
  if (txt) { const s = mk('span'); s.textContent = txt; b.appendChild(s); }
  row.appendChild(b); msgs.appendChild(row); sc();
}

function addAiRow() {
  const row = mk('div','row a');
  const t   = mk('div','at');
  row.appendChild(t); msgs.appendChild(row); sc(); return row;
}

function setAiErr(row, msg) {
  const t = row.querySelector('.at');
  if (t) { t.classList.add('err'); t.textContent = msg; }
}

function addTyping() {
  const row = mk('div','row a');
  const d   = mk('div','dots');
  d.innerHTML = '<div class="d"></div><div class="d"></div><div class="d"></div>';
  row.appendChild(d); msgs.appendChild(row); sc(); return row;
}

function addGenImg(row, url, alt) {
  const w   = mk('div','gim');
  const img = mk('img'); img.src = url; img.alt = alt; img.onload = sc;
  const cap = mk('div','gicap'); cap.textContent = '↑ изображение по запросу';
  w.appendChild(img); w.appendChild(cap); row.appendChild(w); sc();
}

/* ── Typewriter ── */
// Быстрый посимвольный вывод с курсором
async function typewrite(row, text) {
  const t   = row.querySelector('.at');
  const cur = mk('span','cur');
  t.appendChild(cur);

  const SPEED = 12; // мс на символ (очень быстро)
  let i = 0;
  return new Promise(resolve => {
    function tick() {
      if (i < text.length) {
        // Вставляем символ перед курсором
        cur.insertAdjacentText('beforebegin', text[i]);
        i++;
        sc();
        setTimeout(tick, SPEED);
      } else {
        cur.remove();
        resolve();
      }
    }
    tick();
  });
}

// Для строки "Генерирую изображение…" — typewriter с курсором, возвращает объект с stop()
function startTypewriter(row, text) {
  const t   = row.querySelector('.at');
  const cur = mk('span','cur');
  t.appendChild(cur);
  let i = 0;
  let stopped = false;

  function tick() {
    if (stopped) return;
    if (i < text.length) {
      cur.insertAdjacentText('beforebegin', text[i]);
      i++;
      sc();
      setTimeout(tick, 18);
    }
  }
  tick();

  return {
    stop() {
      stopped = true;
      cur.remove();
    }
  };
}

function sc() { msgs.scrollTo({ top: msgs.scrollHeight, behavior: 'smooth' }); }
</script>
